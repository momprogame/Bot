name: Deploy Telegram Bot

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:
  schedule:
    - cron: '*/55 * * * *'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  run-bot:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    
    - name: Install yt-dlp
      run: |
        pip install yt-dlp
        yt-dlp --version
    
    - name: Setup cookies from secret
      env:
        COOKIES_BASE64: ${{ secrets.COOKIES_BASE64 }}
      run: |
        if [ ! -z "$COOKIES_BASE64" ]; then
          echo "$COOKIES_BASE64" | base64 -d > cookies.txt
          echo "✅ Cookies configuradas correctamente"
          echo "📊 Líneas en cookies.txt: $(wc -l < cookies.txt)"
        else
          echo "⚠️ No hay cookies configuradas"
        fi
    
    - name: Wait for previous instance
      run: sleep 30
    
    - name: Run Telegram Bot
      env:
        TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      run: |
        echo "🚀 Iniciando bot de Telegram..."
        echo "⏱️  Tiempo máximo: 50 minutos"
        python bot.py
      timeout-minutes: 50
